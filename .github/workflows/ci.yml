name: CI / Security Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Security audit ──────────────────────────────────────
  security:
    name: pip-audit CVE scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Must install torch CPU before requirements.txt
      # otherwise pip pulls the 3GB CUDA wheel
      - name: Install torch CPU first
        run: |
          pip install torch==2.3.1+cpu \
            --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip-audit --strict
        # --strict: exit 1 if ANY vulnerability found
        # Remove --strict to warn-only on non-critical issues

  # ── 2. Lint ────────────────────────────────────────────────
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Ruff
        run: |
          pip install ruff
          ruff check backend/

  # ── 3. Tests ───────────────────────────────────────────────
  test:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Must install torch CPU before requirements.txt
      - name: Install torch CPU first
        run: |
          pip install torch==2.3.1+cpu \
            --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          SECRET_KEY: ci-test-secret-key-not-real
          OPENAI_API_KEY: sk-fake-key-for-testing
          ENVIRONMENT: test
        run: |
          python -m pytest backend/tests/ -v --tb=short

  # ── 4. Docker build check ──────────────────────────────────
  docker-build:
    name: Docker build (no push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (cache only — no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: resumeai:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 5. Deploy to Render ────────────────────────────────────
  # Uncomment when ready to take full control of deploys.
  # Step 1: Go to Render dashboard → your service → Settings → Deploy Hook → copy URL
  # Step 2: Go to GitHub → Settings → Secrets → Actions → add RENDER_DEPLOY_HOOK_URL
  # Step 3: Go to Render → Settings → turn OFF auto-deploy
  # Step 4: Uncomment the block below
  #
  # deploy:
  #   name: Deploy to Render
  #   runs-on: ubuntu-latest
  #   needs: [security, lint, test, docker-build]
  #   if: github.ref == 'refs/heads/main' && github.event_name == 'push'
  #   steps:
  #     - name: Trigger Render deploy hook
  #       run: |
  #         curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"